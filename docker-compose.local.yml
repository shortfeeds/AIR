version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trinity
      POSTGRES_PASSWORD: trinity_secret
      POSTGRES_DB: trinitypixels
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  n8n:
    image: n8nio/n8n:latest
    container_name: tp-n8n
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=trinity2026
      - WEBHOOK_URL=http://localhost:5678
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  pgdata:
  n8n_data:

services:
  db:
    image: postgres:16-alpine
    container_name: trinity_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trinity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-trinitypixels}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trinity} -d ${POSTGRES_DB:-trinitypixels}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trinity_network

  backend:
    image: ghcr.io/shortfeeds/air/backend:latest
    container_name: trinity_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-trinity}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-trinitypixels}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      PLIVO_AUTH_ID: ${PLIVO_AUTH_ID}
      PLIVO_AUTH_TOKEN: ${PLIVO_AUTH_TOKEN}
    depends_on:
      - db
    ports:
      - "4000:4000"
    networks:
      - trinity_network

  frontend:
    image: ghcr.io/shortfeeds/air/frontend:latest
    container_name: trinity_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - trinity_network

  n8n:
    image: n8nio/n8n:latest
    container_name: trinity_n8n
    restart: always
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_ENV: production
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - trinity_network

volumes:
  postgres_data:
  n8n_data:

networks:
  trinity_network:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    container_name: trinity_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trinity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-trinitypixels}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trinity} -d ${POSTGRES_DB:-trinitypixels}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trinity_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: backend
    container_name: trinity_backend
    restart: always
    init: true
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-trinity}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-trinitypixels}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 4000
      FRONTEND_URL: ${FRONTEND_URL}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      PLIVO_AUTH_ID: ${PLIVO_AUTH_ID}
      PLIVO_AUTH_TOKEN: ${PLIVO_AUTH_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "node src/db/init.js && node src/index.js"
    ports:
      - "4000:4000"
    networks:
      - trinity_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: trinity_frontend
    restart: always
    init: true
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_OPTIONS: "--max-old-space-size=1024"
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - trinity_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1.5G

  n8n:
    image: n8nio/n8n:latest
    container_name: trinity_n8n
    restart: always
    environment:
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      NODE_ENV: production
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - trinity_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  postgres_data:
  n8n_data:

networks:
  trinity_network:
    driver: bridge
